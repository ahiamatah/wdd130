<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <header>
        <div class="logo">
            <a id="logo_link" href="index.html">
                <img src="images/logo.png" height="50" alt="Dry Oar Logo" />
            </a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">Page02</a>
            <a href="site-plan-rafting.html">Site Plan</a>
            <a href="contactus.html">Contact Us</a>
        </nav>
    </header>
    <div id="hero">
        <div id="hero_box">
            <img id="hero_img" src="images/hero.png" alt="people enjoying rafting">
        </div>
        <section id="hero_msg">
            <h1 class="home-title"> Have An Adventure</h1>
            <h4>Make Memories with Dry Oar</h4>
            <div class="buttom_box">
                <a class="book" href="contactus.html">Book Now</a>
            </div>
        </section>
    </div>
    <main class="home-grid">
        <section class="rivers-card">
            <img class="card_img" src="images/rivers.jpg" alt="river in Forest">
            <img class="icon" src="images/river_icon.png" alt="River icon">
            <h2>Rivers</h2>
        </section>
        <section class="camping-card">
            <img class="card_img" src="images/camping.jpg" alt="tent in mountain">
            <img class="icon" src="images/fire_icon.png" alt="fire icon">
            <h2>Camping</h2>
        </section>
        <section class="rapids-card">
            <img class="card_img" src="images/rapids.jpg" alt="rafting in mountain">
            <img class="icon" src="images/oars.png" alt="Oars icon">
            <h2>Rapids</h2>
        </section>
        <img class="mountains" src="images/mountains.jpg" alt="misty mountains">
        <section class="msg">
            <h2>More Than Just The Thrill</h2>
            <a class="join" href="rivers.html">Join Us</a>
        </section>
    </main>
    <footer>
        <p>Dry Oar &copy; 2023 - Prince Eli Ahiamatah</p>
        <p><a href="site-plan-rafting.html">Site Plan</a></p>
        <p><a href="contactus.html">Contact Us</a></p>
        <div class="social">
            <a href="https://facebook.png">
                <img src="images/facebook.png" alt="fb icon">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="twitter icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="instagram icon">
            </a>
        </div>
    </footer>
    
</body>
</html>
